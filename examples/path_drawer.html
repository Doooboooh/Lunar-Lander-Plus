<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LunarLander Waypoint Path Drawer</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7f9;
      color: #1f2933;
    }

    body {
      margin: 0;
    }

    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    button, input {
      height: 36px;
      border: 1px solid #b7c1cc;
      border-radius: 6px;
      background: #ffffff;
      color: #1f2933;
      font: inherit;
    }

    button {
      padding: 0 12px;
      cursor: pointer;
    }

    button.primary {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
    }

    label {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      font-size: 14px;
    }

    input {
      width: 72px;
      padding: 0 8px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 360px;
      gap: 16px;
      align-items: start;
    }

    canvas {
      width: 100%;
      aspect-ratio: 4 / 3;
      display: block;
      border: 1px solid #9aa8b6;
      border-radius: 6px;
      background: #ffffff;
      touch-action: none;
    }

    textarea {
      width: 100%;
      min-height: 420px;
      box-sizing: border-box;
      resize: vertical;
      border: 1px solid #b7c1cc;
      border-radius: 6px;
      padding: 12px;
      font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #17202a;
      background: #ffffff;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #52606d;
      line-height: 1.5;
    }

    @media (max-width: 820px) {
      main {
        padding: 16px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>LunarLander Waypoint Path Drawer</h1>
    <div class="toolbar">
      <button class="primary" id="exportBtn" type="button">导出 JSON</button>
      <button id="clearBtn" type="button">清空</button>
      <button id="downloadBtn" type="button">下载</button>
      <label>采样点数 <input id="sampleCount" type="number" min="2" max="64" value="8"></label>
    </div>
    <div class="workspace">
      <canvas id="canvas" width="800" height="600" aria-label="Draw waypoint path"></canvas>
      <div>
        <textarea id="output" spellcheck="false"></textarea>
        <div class="hint">
          坐标会映射到 LunarLander 观测中的近似区域：x 为 -1.0 到 1.0，y 为 0.55 到 1.35。导出的 JSON 可直接用于 <code>--waypoints-file</code>。
        </div>
      </div>
    </div>
  </main>

  <script>
    const canvas = document.querySelector("#canvas");
    const ctx = canvas.getContext("2d");
    const output = document.querySelector("#output");
    const sampleCount = document.querySelector("#sampleCount");
    const points = [];
    let drawing = false;

    function drawGrid() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "#d7dee6";
      ctx.lineWidth = 1;
      for (let x = 0; x <= canvas.width; x += canvas.width / 8) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= canvas.height; y += canvas.height / 6) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
      ctx.strokeStyle = "#34495e";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(canvas.width * 0.42, canvas.height * 0.82);
      ctx.lineTo(canvas.width * 0.58, canvas.height * 0.82);
      ctx.stroke();
    }

    function redraw() {
      drawGrid();
      if (points.length === 0) return;
      ctx.strokeStyle = "#2563eb";
      ctx.lineWidth = 4;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (const point of points.slice(1)) ctx.lineTo(point.x, point.y);
      ctx.stroke();
      ctx.fillStyle = "#ef4444";
      for (const point of resample(Number(sampleCount.value))) {
        ctx.beginPath();
        ctx.arc(point.x, point.y, 6, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function pointerPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * canvas.width / rect.width,
        y: (event.clientY - rect.top) * canvas.height / rect.height
      };
    }

    function resample(count) {
      if (points.length <= count) return points.slice();
      const sampled = [];
      for (let i = 0; i < count; i += 1) {
        const index = Math.round(i * (points.length - 1) / (count - 1));
        sampled.push(points[index]);
      }
      return sampled;
    }

    function toLanderCoords(point) {
      const x = -1.0 + 2.0 * point.x / canvas.width;
      const y = 1.35 - 0.8 * point.y / canvas.height;
      return [Number(x.toFixed(3)), Number(y.toFixed(3))];
    }

    function exportJson() {
      const waypoints = resample(Number(sampleCount.value)).map(toLanderCoords);
      output.value = JSON.stringify({ name: "drawn_path", waypoints }, null, 2);
    }

    canvas.addEventListener("pointerdown", (event) => {
      drawing = true;
      points.push(pointerPoint(event));
      redraw();
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!drawing) return;
      points.push(pointerPoint(event));
      redraw();
    });

    window.addEventListener("pointerup", () => {
      drawing = false;
      exportJson();
    });

    document.querySelector("#exportBtn").addEventListener("click", exportJson);
    document.querySelector("#clearBtn").addEventListener("click", () => {
      points.length = 0;
      output.value = "";
      redraw();
    });
    document.querySelector("#downloadBtn").addEventListener("click", () => {
      exportJson();
      const blob = new Blob([output.value + "\\n"], { type: "application/json" });
      const anchor = document.createElement("a");
      anchor.href = URL.createObjectURL(blob);
      anchor.download = "drawn_path.json";
      anchor.click();
      URL.revokeObjectURL(anchor.href);
    });
    sampleCount.addEventListener("input", () => {
      redraw();
      exportJson();
    });

    redraw();
    output.value = JSON.stringify({
      name: "drawn_path",
      waypoints: [[-0.45, 1.05], [0.0, 1.3], [0.45, 1.05], [0.0, 0.8]]
    }, null, 2);
  </script>
</body>
</html>
